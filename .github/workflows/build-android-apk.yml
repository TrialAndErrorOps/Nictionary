name: Build Android APK

on:
  pull_request:
    paths:
      - "index.html"
      - ".github/scripts/generate-android-project.sh"
      - ".github/workflows/build-android-apk.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: yes | sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Generate Android project
        run: bash .github/scripts/generate-android-project.sh

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Build signed sideload APK
        working-directory: android
        run: gradle --no-daemon clean assembleRelease

      - name: Name APK
        run: cp android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/Nictionary-v3.21.7.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nictionary-Android-v3.21.7
          path: android/app/build/outputs/apk/release/Nictionary-v3.21.7.apk
          if-no-files-found: error
          retention-days: 14
