name: Build Android APK (Temporary)

on:
  pull_request:
    paths:
      - "index.html"
      - ".github/scripts/generate-android-project.sh"
      - ".github/workflows/build-android-apk.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nictionary-android-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: yes | sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Generate Android project
        run: |
          bash .github/scripts/generate-android-project.sh
          sed -i '/android:postSplashScreenTheme/d' android/app/src/main/res/values-v31/styles.xml
          sed -i '/android:fullBackupContent/d' android/app/src/main/AndroidManifest.xml
          sed -i 's/filename\.isBlank()/filename.trim().isEmpty()/g' android/app/src/main/java/com/trialanderrorops/nictionary/MainActivity.java

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Build signed sideload APK
        working-directory: android
        run: |
          set +e
          gradle --no-daemon clean assembleRelease > ../android-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 220 ../android-build.log
          fi
          exit "$status"

      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Nictionary-Android-build-log
          path: android-build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Name APK
        run: cp android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/Nictionary-v3.21.7.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nictionary-Android-v3.21.7
          path: android/app/build/outputs/apk/release/Nictionary-v3.21.7.apk
          if-no-files-found: error
          retention-days: 14
